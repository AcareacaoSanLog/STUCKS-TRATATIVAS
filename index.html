<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Dashboard Stucks</title>
  <link rel="stylesheet" href="styles.css?v=layout-antigo-funcional-20260711">
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="brand">
        <strong>SANLOG</strong>
        <h1>TORRE STUCKS</h1>
        <p>Gestão operacional de BRs paradas</p>
      </div>
      <nav id="nav" class="nav">
        <button data-view="dashboard" class="active">▦ 🏠 Dashboard</button>
        <div class="nav-group">
          <button class="nav-heading" type="button" data-action="toggle-monitor">📦 Monitoramento <span>⌄</span></button>
          <div class="nav-submenu open" id="monitorSubmenu">
            <button data-view="monitor-received">📥 Received</button>
            <button data-view="monitor-assigned">🏷️ Assigned</button>
            <button data-view="monitor-soclh">🚚 SOC LH</button>
            <button data-view="monitor-onhold">⛔ OnHold</button>
          </div>
        </div>
        <button data-view="base">▤ 📦 Base Stucks <b id="baseBadge">0</b></button>
        <button data-view="damages">⚠️ Avarias <b id="damageBadge">0</b></button>
        <button data-view="treatments">📝 Tratativas <b id="treatmentBadge">0</b></button>
        <button data-view="cities">📍 Cidades</button>
        <button data-view="drivers">🚚 Drivers</button>
        <button data-view="status">📊 Status</button>
        <button data-view="ceps">🗺️ CEPs</button>
        <button data-view="history">🕓 Histórico <b id="historyBadge">0</b></button>
      </nav>
      <div class="side-status"><span class="dot"></span><div><b id="lastUpdate">Aguardando importação</b><small><span id="rowCount">0</span> stucks carregados</small></div></div>
    </aside>

    <main class="main">
      <header class="topbar">
        <div><p>OPERAÇÃO TXF</p><h2 id="title">🏠 Dashboard Stucks</h2></div>
        <div class="actions">
          <button id="saveLocalBtn" title="Salvar base local">💾</button>
          <button id="loadLocalBtn" title="Carregar base local">🗄️</button>
          <button id="clearBtn" title="Limpar base">🗑️</button>
          <button id="exportBtn" title="Exportar visão">⬇️</button>
          <button id="importStucksBtn" class="primary">☁️ Importar STUCKS</button>
          <button id="importCepBtn">📍 Importar CEP</button>
        </div>
      </header>

      <input id="fileInput" type="file" accept=".xlsx,.xls,.csv,.tsv" hidden>
      <input id="cepInput" type="file" accept=".xlsx,.xls,.csv,.tsv" hidden>
      <div id="status" class="status warn">Importe a planilha STUCKS do dia. As tratativas ficam salvas no Supabase e são aplicadas pela BR.</div>
      <section id="content"></section>
    </main>
  </div>

  <div id="modalRoot"></div>
  <script src="vendor/xlsx.full.min.js"></script>
  <script src="app.js?v=layout-antigo-funcional-20260711"></script>
</body>
</html>
